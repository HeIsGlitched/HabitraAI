<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard - HabitraAI</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <header>
        <h1>HabitraAI</h1>
    </header>
    <main>
        <h2>Welcome Back,User</h2>
        <section class="streak-card">
            <h3>Current Streak : 12days</h3>
        </section>

        <section class="habit-card">
            <h3>Today's Habits</h3>
            <form class="habits">
                <div class="habit-item">
                    <input type="checkbox">
                    <label>Workout</label>
                </div>
                <div class="habit-item">
                    <input type="checkbox">
                    <label>Read 10 pages</label>
                </div>
                <div class="habit-item">
                    <input type="checkbox">
                    <label>Meditate</label>
                </div>
                <div class="habit-item">
                    <input type="checkbox">
                    <label>Solve LeetCode</label>
                </div>
            </form>
        </section>
        <section class="progress">
            <h2>Completed : 2/4</h2>
        </section>
    </main>
</body>
</html>
