<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard - HabitraAI</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <header>
        <h1>HabitraAI</h1>
        <button id="logout-btn">Log Out</button>
    </header>
    <main>
        <h2>Welcome Back,User</h2>
        <section class="streak-card">
            <h3>Current Streak : 12days</h3>
        </section>

        <section class="habit-card">
            <h3>Today's Habits</h3>
            <form class="habits">
                <div class="habit-item">
                    <input type="checkbox">
                    <label>Workout</label>
                    <button type="button" class="delete-btn">Delete</button>
                </div>
                <div class="habit-item">
                    <input type="checkbox">
                    <label>Read 10 pages</label>
                    <button type="button" class="delete-btn">Delete</button>
                </div>
                <div class="habit-item">
                    <input type="checkbox">
                    <label>Meditate</label>
                    <button type="button" class="delete-btn">Delete</button>
                </div>
                <div class="habit-item">
                    <input type="checkbox">
                    <label>Solve LeetCode</label>
                    <button type="button" class="delete-btn">Delete</button>
                </div>
            </form>
            <div class="add-habit">
                <input type="text" id="habit-input" placeholder="Enter habit">
                <button id="add-habit-btn">
                    Add Habit
                </button>
            </div>

        </section>
        <section class="progress">
            <h2 id="progress-text">Completed : 2/4</h2>
        </section>
    </main>
    <script src="../js/dashboard.js"></script>
</body>
</html>
