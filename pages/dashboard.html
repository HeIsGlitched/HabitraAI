<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard - HabitraAI</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <header>
        <h1>HabitraAI</h1>
        <div class="menu-container">
            <div id="profile-btn">
                <img src="../images/default-picture.png" alt="Profile">
            </div>
        
            <div class="dropdown-menu">
                <div class="dropdown-profile">
        
                    <img
                        src="../images/default-picture.png"
                        alt="Profile"
                    >
        
                    <h4 id="user-name">
                        Loading...
                    </h4>
        
                </div>
                <hr>
                <a href="profile.html">Profile</a>
        
                <a href="history.html">History</a>
        
                <button id="logout-btn">Logout</button>
            </div>
        </div>
    </header>
    <main>
        <h2 id="welcome-text">Welcome Back, User</h2>
        <div class="top-cards">
            <section class="streak-card">
                <h3>🔥 Current Streak</h3>
                <div id="global-streak" class="streak-number">
                    0 Days
                </div>
            </section>
            <section class="week-history">
                <h3>This Week</h3>
                <div class="week-labels">
                    <span>S</span>
                    <span>M</span>
                    <span>T</span>
                    <span>W</span>
                    <span>T</span>
                    <span>F</span>
                    <span>S</span>
                </div>
            
                <div class="week-boxes"></div>
            </section>
        </div>

        <section class="habit-card">
            <h3>Today's Habits</h3>
            <form class="habits">
            </form>
            <div class="add-habit">
                <input type="text" id="habit-input" placeholder="Enter habit">
                <button id="add-habit-btn">
                    Add Habit
                </button>
            </div>

        </section>
        <section class="progress">

    <h3>Today's Progress</h3>

    <div class="progress-bar">

        <div id="progress-fill"></div>

    </div>

    <p id="progress-text">
        0 / 0
    </p>

</section>
    </main>
    <script src="../js/dashboard.js"></script>
</body>
</html>
